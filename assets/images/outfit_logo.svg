<svg class="wl-logo-svg" viewBox="0 0 500 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    <![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;800');
    
    .font-syt { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 78px; fill: #ffffff; letter-spacing: 1px; }
    .font-fix { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 78px; fill: #6ea8ff; letter-spacing: -2px; }
    .font-tag { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 14px; fill: #ffffff; opacity: 0.8; letter-spacing: 5px; text-transform: uppercase; }
    
    .node { fill: #ffffff; opacity: 0; animation: popIn 0.3s ease-out forwards; }
    .line { stroke: #6ea8ff; stroke-width: 2; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; animation: connect 0.5s ease-out forwards; }
    .energy { stroke: #ffffff; stroke-width: 3; fill: none; stroke-dasharray: 50; stroke-dashoffset: 50; filter: url(#neonGlow); animation: flow 1s linear forwards; }
    .hex-base { stroke: #6ea8ff; stroke-width: 2; fill: rgba(110, 168, 255, 0.0); stroke-dasharray: 180; stroke-dashoffset: 180; animation: drawHex 1s ease-out 0.8s forwards; }
    .growth-bar { fill: #ffffff; filter: url(#neonGlow); transform-origin: bottom; transform: scaleY(0); animation: growBar 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    @keyframes popIn { 100% { opacity: 1; } } @keyframes connect { 100% { stroke-dashoffset: 0; } } @keyframes flow { 100% { stroke-dashoffset: -50; opacity: 0; } } @keyframes drawHex { 100% { stroke-dashoffset: 0; fill: rgba(110, 168, 255, 0.15); } } @keyframes growBar { 100% { transform: scaleY(1); } }
    ]]>
  </style>
  <g transform="translate(50, 70)">
    <g transform="translate(-10, 0)">
      <circle class="node" cx="-30" cy="-20" r="3" style="animation-delay: 0.1s" />
      <circle class="node" cx="-40" cy="20" r="3" style="animation-delay: 0.2s" />
      <circle class="node" cx="-10" cy="30" r="3" style="animation-delay: 0.3s" />
      <circle class="node" cx="0" cy="0" r="4" style="animation-delay: 0.4s" />
      <path class="line" d="M -30,-20 L 0,0" style="animation-delay: 0.3s" />
      <path class="line" d="M -40,20 L 0,0" style="animation-delay: 0.4s" />
      <path class="line" d="M -10,30 L 0,0" style="animation-delay: 0.5s" />
      <path class="energy" d="M -30,-20 L 0,0" style="animation-delay: 0.6s" />
      <path class="energy" d="M -40,20 L 0,0" style="animation-delay: 0.7s" />
    </g>
    <polygon class="hex-base" points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" />
    <g transform="translate(-12, 10)">
      <rect class="growth-bar" x="0" y="-15" width="6" height="15" rx="1" style="animation-delay: 1.2s" />
      <rect class="growth-bar" x="10" y="-25" width="6" height="25" rx="1" style="animation-delay: 1.3s" />
      <rect class="growth-bar" x="20" y="-40" width="6" height="40" rx="1" style="animation-delay: 1.4s" />
    </g>
  </g>
  <g transform="translate(115, 0)">
    <text y="85">
      <tspan class="font-syt">Syt</tspan><tspan class="font-fix">Fix</tspan>
    </text>
    <text y="120" class="font-tag">Engineering Digital Growth</text>
  </g>
</svg>
