<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">

<defs>

<!-- MAIN BACKGROUND -->
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#071a2f"/>
  <stop offset="50%" stop-color="#0c3a6b"/>
  <stop offset="100%" stop-color="#1162a8"/>
</linearGradient>

<!-- CENTER DARKEN FOR TEXT -->
<radialGradient id="focusGrad" cx="50%" cy="40%" r="60%">
  <stop offset="0%" stop-color="#000" stop-opacity=".35"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0"/>
</radialGradient>

<!-- GLOW LINE -->
<linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#7fd0ff" stop-opacity="0"/>
  <stop offset="50%" stop-color="#7fd0ff" stop-opacity=".5"/>
  <stop offset="100%" stop-color="#7fd0ff" stop-opacity="0"/>
</linearGradient>

<!-- SOFT GLOW -->
<filter id="blur">
  <feGaussianBlur stdDeviation="3"/>
</filter>

</defs>


<!-- BASE -->
<rect width="100%" height="100%" fill="url(#bgGrad)"/>
<rect width="100%" height="100%" fill="url(#focusGrad)"/>


<!-- SUBTLE FLOW LINES -->
<g opacity=".25">

<path d="M0 500 C300 420 600 600 1200 520"
stroke="url(#lineGrad)"
stroke-width="2"
fill="none"
filter="url(#blur)">

<animate attributeName="d"
dur="28s"
repeatCount="indefinite"
values="
M0 500 C300 420 600 600 1200 520;
M0 520 C350 480 650 580 1200 500;
M0 480 C320 560 640 450 1200 520;
M0 500 C300 420 600 600 1200 520
"/>

</path>


<path d="M0 620 C300 540 650 720 1200 650"
stroke="url(#lineGrad)"
stroke-width="1.5"
fill="none"
filter="url(#blur)">

<animate attributeName="d"
dur="34s"
repeatCount="indefinite"
values="
M0 620 C300 540 650 720 1200 650;
M0 650 C360 580 700 700 1200 620;
M0 600 C340 720 620 580 1200 640;
M0 620 C300 540 650 720 1200 650
"/>

</path>

</g>


<!-- RANDOM FLOATING PARTICLES -->
<g fill="#8ed2ff" opacity=".18">

<circle cx="120" cy="500" r="4">
<animate attributeName="cy" dur="23s" values="500;420;560;500" repeatCount="indefinite"/>
</circle>

<circle cx="340" cy="650" r="3">
<animate attributeName="cy" dur="27s" values="650;600;720;650" repeatCount="indefinite"/>
</circle>

<circle cx="820" cy="460" r="3">
<animate attributeName="cy" dur="31s" values="460;520;430;460" repeatCount="indefinite"/>
</circle>

<circle cx="960" cy="580" r="4">
<animate attributeName="cy" dur="29s" values="580;520;640;580" repeatCount="indefinite"/>
</circle>

<circle cx="1080" cy="700" r="3">
<animate attributeName="cy" dur="35s" values="700;640;740;700" repeatCount="indefinite"/>
</circle>

</g>


<!-- FAINT NETWORK LINES -->
<g stroke="#7fcfff" stroke-opacity=".08">

<line x1="200" y1="620" x2="420" y2="540"/>
<line x1="420" y1="540" x2="680" y2="620"/>
<line x1="680" y1="620" x2="900" y2="560"/>

</g>

</svg>
