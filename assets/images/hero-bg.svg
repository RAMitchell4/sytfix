  <svg width="100%" height="500" viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0077cc"/>
      <stop offset="100%" stop-color="#070a1f"/>
    </radialGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .pulse {
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .trace-line {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: draw 3s linear infinite;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Animated traces -->
  <g filter="url(#glow)">
    <line x1="100" y1="250" x2="600" y2="250" stroke="url(#trace)" stroke-width="3" class="trace-line"/>
    <line x1="600" y1="250" x2="1100" y2="150" stroke="url(#trace)" stroke-width="2" class="trace-line"/>
    <line x1="100" y1="250" x2="600" y2="350" stroke="url(#trace)" stroke-width="2" class="trace-line"/>
  </g>

  <!-- Pulsing points -->
  <circle cx="100" cy="250" r="6" fill="#ffffff" class="pulse"/>
  <circle cx="600" cy="250" r="6" fill="#00aaff" class="pulse"/>
  <circle cx="1100" cy="150" r="6" fill="#0077cc" class="pulse"/>
</svg>
