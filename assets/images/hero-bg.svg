<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">

<style>
  .layer {
    transform-origin: 0 450px; /* vanishing point on left */
    animation: fly 12s linear infinite; /* slower */
  }

  .d1 { animation-delay: -2s; }
  .d2 { animation-delay: -4s; }
  .d3 { animation-delay: -6s; }
  .d4 { animation-delay: -8s; }
  .d5 { animation-delay: -10s; }

  @keyframes fly {
    0% {
      transform: scale(0.1) translateX(0px) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 0.85;
    }
    100% {
      transform: scale(2.2) translateX(1400px) rotate(3deg);
      opacity: 0;
    }
  }

  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: .7; }
    50% { opacity: 1; }
  }

  .stars {
    transform-origin: 0 450px;
    animation: starZoom 8s linear infinite; /* slower */
  }

  @keyframes starZoom {
    0% { transform: scale(0.2); opacity: 0; }
    100% { transform: scale(3); opacity: 0; }
  }
</style>

<defs>
  <radialGradient id="bg" cx="0%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#3a5eff"/> <!-- brighter blue -->
    <stop offset="100%" stop-color="#070a1f"/>
  </radialGradient>

  <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8bb6ff"/> <!-- brighter traces -->
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect width="100%" height="100%" fill="url(#bg)" />

<!-- STAR STREAKS -->
<g class="stars">
  <circle cx="0" cy="450" r="2.5" fill="white"/>
  <circle cx="50" cy="430" r="2.2" fill="white"/>
  <circle cx="-50" cy="470" r="2.2" fill="white"/>
</g>

<!-- VANISHING POINT GROUP -->
<g transform="translate(0,450)" filter="url(#glow)">

  <g class="layer">
    <g stroke="url(#trace)" stroke-width="2" fill="none">
      <rect x="0" y="-200" width="600" height="400"/>
      <line x1="0" y1="-350" x2="1400" y2="0"/>
      <line x1="0" y1="350" x2="1400" y2="0"/>
      <path d="M0 -150 L100 -150 L100 0 L300 0"/>
    </g>
    <circle cx="100" cy="0" r="6" fill="white" class="pulse"/>
  </g>

  <g class="layer d1">
    <g stroke="url(#trace)" stroke-width="2" fill="none">
      <rect x="0" y="-200" width="600" height="400"/>
      <path d="M0 -100 L200 -100 L200 100 L400 100"/>
    </g>
    <circle cx="200" cy="100" r="6" fill="white" class="pulse"/>
  </g>

  <g class="layer d2">
    <g stroke="url(#trace)" stroke-width="2" fill="none">
      <rect x="0" y="-200" width="600" height="400"/>
      <path d="M0 50 L200 50 L200 -150"/>
    </g>
    <circle cx="200" cy="-150" r="6" fill="white" class="pulse"/>
  </g>

  <g class="layer d3">
    <g stroke="url(#trace)" stroke-width="2" fill="none">
      <rect x="0" y="-200" width="600" height="400"/>
      <path d="M0 150 L200 0 L-150 0"/>
    </g>
    <circle cx="200" cy="0" r="6" fill="white" class="pulse"/>
  </g>

  <g class="layer d4">
    <g stroke="url(#trace)" stroke-width="2" fill="none">
      <rect x="0" y="-200" width="600" height="400"/>
      <path d="M0 -100 L200 -100 L200 150"/>
    </g>
    <circle cx="200" cy="150" r="6" fill="white" class="pulse"/>
  </g>

  <g class="layer d5">
    <g stroke="url(#trace)" stroke-width="2" fill="none">
      <rect x="0" y="-200" width="600" height="400"/>
      <path d="M0 0 L250 0 L250 -200"/>
    </g>
    <circle cx="250" cy="-200" r="6" fill="white" class="pulse"/>
  </g>

</g>

</svg>
