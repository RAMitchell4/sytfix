<svg class="wl-logo-svg" viewBox="0 0 550 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .f-syt { font-family: 'Jost', sans-serif; font-weight: 800; font-size: 74px; fill: #ffffff; opacity: 0; animation: appear 0.1s linear 1.2s forwards; }
    .f-fix { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 74px; fill: #6ea8ff; opacity: 0; animation: appear 0.1s linear 1.6s forwards; }
    .f-tag { font-family: 'Jost', sans-serif; font-weight: 400; font-size: 14px; fill: #a0c4ff; letter-spacing: 6px; text-transform: uppercase; opacity: 0; animation: fadeIn 1s ease 2.2s forwards; }

    .laser { stroke: #ffffff; stroke-width: 3; filter: url(#laserGlow); animation: sweep 2.5s ease-in-out forwards; opacity: 0; }
    .geo-path { stroke: #6ea8ff; stroke-width: 2.5; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 1s ease-out 0.2s forwards; }
    .geo-fill { fill: #6ea8ff; opacity: 0; animation: fillIn 0.5s ease-out 0.8s forwards; }
    
    @keyframes sweep { 0% { transform: translateX(20px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(380px); opacity: 0; } }
    @keyframes draw { 100% { stroke-dashoffset: 0; } }
    @keyframes fillIn { 100% { opacity: 0.2; } }
    @keyframes appear { 100% { opacity: 1; } }
    @keyframes fadeIn { 100% { opacity: 1; } }
  </style>

  <line class="laser" x1="0" y1="20" x2="0" y2="140" />

  <g transform="translate(60, 80)">
    <path class="geo-path" d="M 0,-35 L 30,0 L 0,35 L -30,0 Z" />
    <path class="geo-fill" d="M 0,-35 L 30,0 L 0,35 L -30,0 Z" />
    
    <path class="geo-path" d="M -15,5 L 0,-15 L 15,5" style="stroke:#ffffff; stroke-width:3; animation-delay: 0.5s;" />
  </g>

  <g transform="translate(125, 0)">
    <text y="95">
      <tspan class="f-syt">Syt</tspan><tspan class="f-fix">Fix</tspan>
    </text>
    <text y="130" class="f-tag">Engineering Digital Growth</text>
  </g>
</svg>
