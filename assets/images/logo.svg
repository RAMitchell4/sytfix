<svg class="wl-logo-svg" viewBox="0 0 550 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ea8ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6ea8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    
    <filter id="eliteGlow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Premium Font Choices */
    @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;800&display=swap');
    
    .logo-text-syt { font-family: 'Jost', sans-serif; font-weight: 800; font-size: 72px; fill: #ffffff; letter-spacing: -2px; opacity: 0; animation: fadeTextIn 0.5s ease-out 3s forwards; }
    .logo-text-fix { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 72px; fill: #6ea8ff; letter-spacing: -2px; opacity: 0; animation: fadeTextIn 0.5s ease-out 3.2s forwards; }
    .logo-tagline { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 14px; fill: #ffffff; text-transform: uppercase; letter-spacing: 5px; opacity: 0; animation: fadeTextIn 0.8s ease-out 3.5s forwards; }

    /* The Monogram Mark Styles */
    .mono-path { stroke: #6ea8ff; stroke-width: 2.5; fill: none; stroke-dasharray: 400; stroke-dashoffset: 400; filter: url(#eliteGlow); animation: constructSF 2.5s cubic-bezier(0.77, 0, 0.175, 1) forwards; }
    
    /* Erratic Data Nodes (Broken State) */
    .broken-node { fill: #6ea8ff; opacity: 0.7; animation: nodeScatter 2s ease-in-out infinite alternate; }
    
    /* Final Surge Pulse */
    .surge-pulse { stroke: #ffffff; stroke-width: 0; fill: none; opacity: 0; animation: surgeEffect 1s ease-out 2.2s; }

    /* --- Animations --- */
    
    /* Scatter nodes (initial chaotic state) */
    @keyframes nodeScatter {
      0% { transform: translate(0, 0); opacity: 0.7; }
      100% { transform: translate(calc(var(--scatter-x)*1px), calc(var(--scatter-y)*1px)); opacity: 0.2; }
    }

    /* SF Path construction (fixing state) */
    @keyframes constructSF {
      0% { stroke-dashoffset: 400; stroke: #6ea8ff; stroke-width: 2.5; }
      70% { stroke-dashoffset: 0; stroke: #6ea8ff; stroke-width: 2.5; }
      100% { stroke-dashoffset: 0; stroke: #ffffff; stroke-width: 4; }
    }
    
    /* Text appearance */
    @keyframes fadeTextIn {
      to { opacity: 1; transform: translate(0,0); }
    }
    
    /* The final "Wow" Surge pulse */
    @keyframes surgeEffect {
      0% { stroke-width: 0; r: 0; opacity: 0.8; }
      100% { stroke-width: 20; r: 100; opacity: 0; }
    }
  </style>

  <g transform="translate(20, 10)">
    
    <g class="nodes-group">
      <circle class="broken-node" cx="60" cy="50" r="4" style="--scatter-x: -30; --scatter-y: -40; animation: nodeScatter 2s ease-in-out 1.2 forwards, fadeTextIn 0.1s linear 2.5s reverse forwards; "/>
      <circle class="broken-node" cx="60" cy="110" r="4" style="--scatter-x: 30; --scatter-y: 40; animation: nodeScatter 2s ease-in-out 1 forwards, fadeTextIn 0.1s linear 2.5s reverse forwards; "/>
      <circle class="broken-node" cx="100" cy="80" r="4" style="--scatter-x: 50; --scatter-y: -20; animation: nodeScatter 2s ease-in-out 1.5 forwards, fadeTextIn 0.1s linear 2.5s reverse forwards; "/>
    </g>

    <g transform="translate(60, 80)">
      <path class="mono-path" d="M -25,-45 L 25,-45 L 25,-15 L -10,-15 L -10,15 L 25,15 L 25,45 L -25,45 M 0,-15 L 0,15 M -25,-15 L -15,-15"/>
      
      <circle class="surge-pulse" cx="0" cy="0" r="0" />
    </g>

    <g transform="translate(140, 0)">
      <text y="90">
        <tspan class="logo-text-syt">Syt</tspan><tspan class="logo-text-fix">Fix</tspan>
      </text>
      <text y="130" class="logo-tagline">Engineering Digital Growth</text>
    </g>
    
  </g>
</svg>
