<svg viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#6ea8ff"/>
<stop offset="100%" stop-color="#ffffff"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="3" result="b"/>
<feMerge>
<feMergeNode in="b"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<style>

.brand{
font-family:Orbitron,Arial,sans-serif;
font-size:64px;
fill:white;
letter-spacing:2px;
font-weight:700;
filter:url(#glow);
}

.tag{
font-family:Inter,Arial,sans-serif;
font-size:13px;
fill:#6ea8ff;
letter-spacing:5px;
text-transform:uppercase;
}

.trace{
stroke:url(#traceGrad);
stroke-width:2;
fill:none;
stroke-dasharray:240;
stroke-dashoffset:240;
animation:flow 4s linear infinite;
}

.signal{
stroke:#6ea8ff;
stroke-width:1.5;
fill:none;
stroke-dasharray:120;
stroke-dashoffset:120;
animation:flow 3s linear infinite;
}

.node{
fill:white;
animation:pulse 2s ease-in-out infinite;
}

@keyframes flow{
0%{stroke-dashoffset:240;opacity:0}
50%{opacity:1}
100%{stroke-dashoffset:-240;opacity:0}
}

@keyframes pulse{
0%,100%{opacity:.5}
50%{opacity:1}
}

</style>

<!-- Hex Tech Core -->
<g transform="translate(70 90)" filter="url(#glow)">

<polygon
points="0,-48 42,-24 42,24 0,48 -42,24 -42,-24"
stroke="#6ea8ff"
stroke-width="2"
fill="none"
opacity=".4"
/>

<path d="M0 -48 L0 48" class="trace"/>
<path d="M-42 -24 L42 24" class="trace"/>
<path d="M-42 24 L42 -24" class="trace"/>

<circle cx="0" cy="-48" r="3" class="node"/>
<circle cx="42" cy="0" r="3" class="node"/>
<circle cx="-42" cy="0" r="3" class="node"/>
<circle cx="0" cy="48" r="3" class="node"/>

</g>

<!-- Data Signals traveling toward text -->
<path d="M120 90 L180 90" class="signal"/>
<path d="M120 75 L180 75" class="signal"/>
<path d="M120 105 L180 105" class="signal"/>

<!-- Brand -->
<text x="185" y="100" class="brand">SytFix</text>

<!-- Tagline -->
<text x="190" y="125" class="tag">
Engineering Digital Growth
</text>

</svg>
