  <style>
    :root {
      --bg-color: #05070a;
      --bg-overlay: rgba(255, 255, 255, 0.03);
      --text-main: #ffffff;
      --text-muted: #a0c4ff;
      --brand-blue: #6ea8ff;
      --border-color: rgba(110, 168, 255, 0.2);
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-hover: rgba(255, 255, 255, 0.06);
    }
    [data-theme="light"] {
      --bg-color: #f4f7f9;
      --bg-overlay: #ffffff;
      --text-main: #111827;
      --text-muted: #4b5563;
      --brand-blue: #2563eb;
      --border-color: #d1d5db;
      --card-bg: #ffffff;
      --card-hover: #f9fafb;
    }

    body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: 'Outfit', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
    .site-background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: url('assets/images/background.svg') no-repeat center center; background-size: cover; opacity: 1; transition: 0.3s; }
    [data-theme="light"] .site-background { filter: invert(1); opacity: 0.05; }

    .wl-header { background: var(--bg-color); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10000; transition: background-color 0.3s ease; }
    .wl-container { max-width: 1300px; margin: 0 auto; padding: 10px 30px 0 30px; }
    .wl-tier-top { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; }
    .wl-logo-svg { height: 105px; width: auto; display: block; }
    
    .wl-utility { display: flex; align-items: center; gap: 15px; }
    .theme-toggle { background: none; border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; padding: 8px 12px; border-radius: 4px; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
    .theme-toggle:hover { border-color: var(--brand-blue); color: var(--brand-blue); }
    .wl-mini-btn { background: var(--brand-blue); color: #ffffff; min-width: 140px; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .wl-mini-btn:hover { background: var(--text-main); color: var(--bg-color); box-shadow: 0 0 20px rgba(110, 168, 255, 0.5); transform: translateY(-2px); }
    
    .wl-tier-bottom { border-top: 1px solid var(--border-color); padding: 15px 0; }
    .wl-nav-links { display: flex; gap: 45px; align-items: center; }
    .wl-nav-links a { color: var(--text-main); text-decoration: none; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; opacity: 0.85; transition: all 0.3s ease; display: inline-block; }
    .wl-nav-links a:hover { opacity: 1; color: var(--brand-blue); transform: translateY(-2px); }
    
    main { max-width: 900px; margin: 50px auto; padding: 0 20px; line-height: 1.7; }
    .page-hero { text-align: center; margin-bottom: 60px; }
    .page-hero h1 { font-size: 3rem; color: var(--text-main); margin-bottom: 10px; font-weight: 800; }
    .page-hero h1 span { color: var(--brand-blue); }
    .page-hero p { font-size: 1.25rem; color: var(--text-muted); font-weight: 400; }
    
    .content-box { background: var(--bg-overlay); border: 1px solid var(--border-color); padding: 45px 40px; border-radius: 8px; margin-bottom: 30px; transition: 0.3s; }
    .content-box h2 { color: var(--brand-blue); margin-top: 0; font-size: 1.8rem; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
    .content-box p { font-size: 1.15rem; color: var(--text-main); margin-bottom: 15px; font-weight: 300; }
    
    .specialties-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 40px; }
    .specialty-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 35px 20px; text-align: center; border-radius: 6px; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: default; }
    .specialty-card:hover { border-color: var(--brand-blue); transform: translateY(-5px); background: var(--card-hover); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .specialty-card h3 { margin: 0; font-size: 1.1rem; color: var(--text-main); line-height: 1.4; font-weight: 600; }
    
    .site-footer { border-top: 1px solid var(--border-color); background: var(--bg-overlay); padding: 50px 20px 20px 20px; margin-top: 60px; transition: 0.3s; }
    .footer-grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 40px; }
    .footer-brand .static-logo { max-width: 150px; margin-bottom: 10px; }
    .footer-brand p { color: var(--brand-blue); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; margin: 0; }
    .footer-contact h4 { font-size: 1.4rem; color: var(--text-main); margin: 0 0 5px 0; font-weight: 600; }
    .footer-contact .title { color: var(--brand-blue); font-weight: 600; margin: 0 0 15px 0; font-size: 1rem; }
    .footer-contact p { margin: 5px 0; color: var(--text-muted); font-size: 1rem; }
    .footer-contact a { color: var(--text-main); text-decoration: none; font-weight: 600; transition: 0.3s; }
    .footer-contact a:hover { color: var(--brand-blue); }
    .footer-bottom { text-align: center; padding-top: 20px; font-size: 0.9rem; color: var(--text-muted); }
